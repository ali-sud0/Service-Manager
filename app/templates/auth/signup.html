{% extends "base.html" %}

{% block title %}Sign Up - ServiceHub{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full animate-fade-in">
        <div class="bg-white rounded-2xl shadow-lg p-8 border border-slate-100">
            <div class="text-center mb-8">
                <div class="bg-slate-900 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-user-plus text-white text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Create account</h2>
                <p class="text-slate-500 text-sm mt-1">Join ServiceHub today</p>
            </div>
            
            <form id="signupForm" class="space-y-4" >
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" name="first_name" placeholder="First name" required 
                           class="px-3 py-2.5 border border-slate-200 rounded-xl focus:border-slate-400 focus:ring-2 focus:ring-slate-200 transition text-sm">
                    <input type="text" name="last_name" placeholder="Last name" required 
                           class="px-3 py-2.5 border border-slate-200 rounded-xl focus:border-slate-400 focus:ring-2 focus:ring-slate-200 transition text-sm">
                </div>
                
                <input type="text" name="username" placeholder="Username" required 
                       class="w-full px-3 py-2.5 border border-slate-200 rounded-xl focus:border-slate-400 focus:ring-2 focus:ring-slate-200 transition text-sm">
                
                <input type="email" name="email" placeholder="Email address" required 
                       class="w-full px-3 py-2.5 border border-slate-200 rounded-xl focus:border-slate-400 focus:ring-2 focus:ring-slate-200 transition text-sm">
                
                <input type="tel" name="phone" placeholder="Phone number (Optional)" 
                       class="w-full px-3 py-2.5 border border-slate-200 rounded-xl focus:border-slate-400 focus:ring-2 focus:ring-slate-200 transition text-sm">
                
                <input type="password" name="password" placeholder="Password" required 
                       class="w-full px-3 py-2.5 border border-slate-200 rounded-xl focus:border-slate-400 focus:ring-2 focus:ring-slate-200 transition text-sm">
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Account type</label>
                    <div class="flex gap-3">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="role" value="customer" checked class="hidden peer">
                            <div class="border border-slate-200 rounded-xl p-3 text-center peer-checked:border-slate-900 peer-checked:bg-slate-50 transition">
                                <i class="fas fa-shopping-bag text-slate-400 peer-checked:text-slate-900"></i>
                                <p class="text-xs mt-1 text-slate-600">Customer</p>
                            </div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="role" value="provider" class="hidden peer">
                            <div class="border border-slate-200 rounded-xl p-3 text-center peer-checked:border-slate-900 peer-checked:bg-slate-50 transition">
                                <i class="fas fa-briefcase text-slate-400 peer-checked:text-slate-900"></i>
                                <p class="text-xs mt-1 text-slate-600">Provider</p>
                            </div>
                        </label>
                    </div>
                </div>
                
                <button type="submit" class="w-full bg-slate-900 text-white py-2.5 rounded-xl font-medium hover:bg-slate-800 transition text-sm">
                    Create Account
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-sm text-slate-600">
                    Already have an account? 
                    <a href="/auth/login" class="text-slate-900 font-medium hover:underline">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('signupForm').addEventListener('submit', handleSignup);
</script>
{% endblock %}
