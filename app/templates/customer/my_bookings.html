{% extends "base.html" %}

{% block title %}My Bookings - ServiceHub{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">My Bookings</h1>
            <p class="text-slate-500 text-sm mt-1">View and manage your service bookings</p>
        </div>
        <button onclick="downloadCustomerReport()" 
                class="bg-purple-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-purple-700 transition shadow-sm">
            <i class="fas fa-file-pdf mr-2"></i> Download Report
        </button>
    </div>

    <!-- Tabs -->
    <div class="flex gap-2 border-b border-slate-200 mb-6">
        <button onclick="loadBookings('all')" id="tabAll" class="px-4 py-2 text-sm font-medium text-slate-600 border-b-2 border-transparent hover:text-slate-800 transition">
            All Bookings
        </button>
        <button onclick="loadBookings('pending')" id="tabPending" class="px-4 py-2 text-sm font-medium text-slate-600 border-b-2 border-transparent hover:text-slate-800 transition">
            Pending
        </button>
        <button onclick="loadBookings('confirmed')" id="tabConfirmed" class="px-4 py-2 text-sm font-medium text-slate-600 border-b-2 border-transparent hover:text-slate-800 transition">
            Confirmed
        </button>
        <button onclick="loadBookings('completed')" id="tabCompleted" class="px-4 py-2 text-sm font-medium text-slate-600 border-b-2 border-transparent hover:text-slate-800 transition">
            Completed
        </button>
        <button onclick="loadBookings('cancelled')" id="tabCancelled" class="px-4 py-2 text-sm font-medium text-slate-600 border-b-2 border-transparent hover:text-slate-800 transition">
            Cancelled
        </button>
    </div>

    <!-- Bookings List -->
    <div id="bookingsList" class="space-y-4">
        <div class="text-center py-12">
            <div class="spinner mx-auto"></div>
            <p class="mt-3 text-slate-500 text-sm">Loading your bookings...</p>
        </div>
    </div>
</div>

<!-- Payment Modal -->
<div id="paymentModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 modal-overlay">
    <div class="bg-white rounded-xl shadow-xl max-w-md w-full mx-4 modal-content">
        <div class="p-5">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-slate-800">Make Payment</h3>
                <button onclick="closePaymentModal()" class="text-slate-400 hover:text-slate-600">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="paymentContent">
                <!-- Payment details will be loaded here -->
            </div>
        </div>
    </div>
</div>

<!-- Payment Info Modal -->
<div id="paymentInfoModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 modal-overlay">
    <div class="bg-white rounded-xl shadow-xl max-w-md w-full mx-4 modal-content">
        <div class="p-5">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-slate-800">Payment Details</h3>
                <button onclick="closePaymentInfoModal()" class="text-slate-400 hover:text-slate-600">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="paymentInfoContent">
                <!-- Payment info will be loaded here -->
            </div>
        </div>
    </div>
</div>

<!-- Payment Success Modal -->
<div id="paymentSuccessModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 modal-overlay">
    <div class="bg-white rounded-xl shadow-xl max-w-md w-full mx-4 modal-content">
        <div class="p-5">
            <div id="paymentSuccessContent">
                <!-- Success content will be loaded here -->
            </div>
        </div>
    </div>
</div>

<script src="/static/js/my-bookings.js"></script>


{% endblock %}
