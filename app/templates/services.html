{% extends "base.html" %}

{% block title %}Browse Services - ServiceHub{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <!-- Hero Section -->
    <div class="text-center mb-12">
        <h1 class="text-3xl md:text-4xl font-bold text-slate-800 mb-3">
            Find the perfect 
            <span class="text-slate-900">service</span>
        </h1>
        <p class="text-slate-500 max-w-md mx-auto">
            Discover professional service providers and book with confidence
        </p>
    </div>

    <!-- Search Section -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-6 gap-3">
            <div class="lg:col-span-2">
                <input type="text" id="searchInput" placeholder="Search services..." 
                       class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:border-slate-400 focus:ring-2 focus:ring-slate-200 transition text-sm">
            </div>
            <div>
                <select id="categorySelect" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:border-slate-400 text-sm">
                    <option value="">All Categories</option>
                </select>
            </div>
            <div>
                <select id="providerSelect" class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:border-slate-400 text-sm">
                    <option value="">All Providers</option>
                </select>
            </div>
            <div>
                <input type="number" id="minPrice" placeholder="Min price" 
                       class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:border-slate-400 text-sm">
            </div>
            <div>
                <input type="number" id="maxPrice" placeholder="Max price" 
                       class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:border-slate-400 text-sm">
            </div>
        </div>
    </div>

    <!-- Services Grid -->
    <div id="servicesGrid" class="services-grid">
        <div class="col-span-full text-center py-12">
            <div class="spinner mx-auto"></div>
            <p class="mt-3 text-slate-500 text-sm">Loading services...</p>
        </div>
    </div>
</div>

<!-- Booking Modal -->
<div id="bookingModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 modal-overlay">
    <div class="bg-white rounded-2xl shadow-xl max-w-md w-full mx-4 modal-content">
        <div class="p-6">
            <h3 class="text-lg font-semibold text-slate-800 mb-4">Book Service</h3>
            <div id="modalContent"></div>
        </div>
    </div>
</div>

<script src="/static/js/services.js"></script>
{% endblock %}
