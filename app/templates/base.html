<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ServiceHub - Professional Service Booking{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Scripts -->
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/notifications.js"></script>
    
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-slate-50" >
    <!-- Navigation -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <a href="/services" class="text-slate-600 hover:text-slate-900 transition text-sm font-medium px-3 py-2 rounded-lg hover:bg-slate-100">Services</a>
                </div>
                
                <!-- قسمت لاگین نشده -->
                <div id="loggedOutNav" class="flex items-center space-x-3">
                    <a href="/auth/login" class="text-slate-600 hover:text-slate-900 transition text-sm font-medium px-3 py-2 rounded-lg hover:bg-slate-100">Login</a>
                    <a href="/auth/signup" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-slate-800 transition">Sign Up</a>
                </div>
                
                <!-- قسمت لاگین شده -->
                <div id="loggedInNav" class="flex items-center space-x-3" style="display: none;">
                    <button id="notificationBtn" class="relative p-2 rounded-lg text-slate-500 hover:text-slate-700 hover:bg-slate-100 transition">
                        <i class="fas fa-bell text-lg"></i>
                        <span id="notificationBadge" class="absolute top-1 right-1 bg-red-500 text-white text-xs rounded-full h-4 w-4 flex items-center justify-center hidden">0</span>
                    </button>
                    
                    <div class="relative group">
                        <button class="flex items-center space-x-2 px-3 py-2 rounded-lg hover:bg-slate-100 transition">
                            <div class="bg-slate-200 w-8 h-8 rounded-full flex items-center justify-center text-slate-600">
                                <i class="fas fa-user text-sm"></i>
                            </div>
                            <span id="userNameSpan" class="font-medium text-slate-700 text-sm">User</span>
                            <i class="fas fa-chevron-down text-xs text-slate-400"></i>
                        </button>
                        
                        <div class="absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg hidden group-hover:block -translate-y-4 z-50 border border-slate-100 overflow-hidden">
                            <div class="p-3 border-b border-slate-100">
                                <p id="userFullNameSpan" class="font-medium text-slate-800 text-sm">Provider test</p>
                                <p id="userEmailSpan" class="text-xs text-slate-500">aasd@gmail.com</p>
                                <p id="userRoleSpan" class="text-xs text-slate-400 mt-1">Provider</p>
                            </div>
                            
                            <button id="editProfileMenuItem" onclick="openEditProfileModal()" class="flex items-start px-4 py-2.5 text-sm text-slate-600 hover:bg-slate-50 transition">
                                <i class="fas fa-edit w-5"></i>
                                <span class="ml-3">Edit Profile</span>
                            </button>
                            
                            <!-- My Bookings Link -->
                            <a id="myBookingsMenuItem" href="/dashboard/customer" class="flex items-center px-4 py-2.5 text-sm text-slate-600 hover:bg-slate-50 transition">
                                <i class="fas fa-calendar-alt w-5"></i>
                                <span class="ml-3">My Bookings</span>
                            </a>
                            
                            <a href="/services" class="flex items-center px-4 py-2.5 text-sm text-slate-600 hover:bg-slate-50 transition">
                                <i class="fas fa-search w-5"></i>
                                <span class="ml-3">Browse Services</span>
                            </a>
                            
                            <a id="dashboardLink" href="/dashboard/provider" class="flex items-center px-4 py-2.5 text-sm text-slate-600 hover:bg-slate-50 transition" style="display: block;">
                                <i class="fas fa-chart-line w-5"></i>
                                <span class="ml-3">Dashboard</span>
                            </a>
                            
                            <hr class="my-1">
                            
                            <a href="#" onclick="handleLogout(); return false;" class="flex items-center px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition">
                                <i class="fas fa-sign-out-alt w-5"></i>
                                <span class="ml-3">Logout</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="animate-fade-in">
        {% block content %}{% endblock %}
    </main>

    <!-- Notification Panel -->
    <div id="notificationPanel" class="fixed top-16 right-4 w-80 bg-white rounded-xl shadow-xl hidden z-50 border border-slate-200">
        <div class="p-3 border-b border-slate-100">
            <h3 class="font-semibold text-slate-800 text-sm">Notifications</h3>
        </div>
        <div id="notificationList" class="max-h-80 overflow-y-auto">
            <div class="p-6 text-center">
                <div class="spinner mx-auto"></div>
                <p class="mt-3 text-slate-400 text-xs">Loading...</p>
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
<div id="editProfileModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 modal-overlay">
    <div class="bg-white rounded-xl shadow-xl max-w-md w-full mx-4 modal-content">
        <div class="p-5">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-slate-800">Edit Profile</h3>
                <button onclick="closeEditProfileModal()" class="text-slate-400 hover:text-slate-600">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="editProfileForm" class="space-y-3">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
                    <input type="text" id="editFullName" name="full_name" required 
                           class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-slate-200 focus:border-slate-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input type="text" id="editUsername" name="username" required 
                           class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-slate-200 focus:border-slate-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input type="email" id="editEmail" name="email" required 
                           class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-slate-200 focus:border-slate-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Phone</label>
                    <input type="tel" id="editPhone" name="phone" 
                           class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-slate-200 focus:border-slate-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">New Password (leave blank to keep current)</label>
                    <input type="password" id="editPassword" name="password" 
                           class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-slate-200 focus:border-slate-400">
                </div>
                <div class="flex gap-3 pt-3">
                    <button type="submit" class="flex-1 bg-slate-900 text-white py-2 rounded-lg text-sm font-medium hover:bg-slate-800 transition">Save Changes</button>
                    <button type="button" onclick="closeEditProfileModal()" class="flex-1 border border-slate-200 py-2 rounded-lg text-sm hover:bg-slate-50 transition">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>

    <script src="/static/js/base.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
