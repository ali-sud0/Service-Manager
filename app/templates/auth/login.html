{% extends "base.html" %}

{% block title %}Login - ServiceHub{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full animate-fade-in">
        <div class="bg-white rounded-2xl shadow-lg p-8 border border-slate-100">
            <div class="text-center mb-8">
                <div class="bg-slate-900 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-calendar-check text-white text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Welcome back</h2>
                <p class="text-slate-500 text-sm mt-1">Sign in to your account</p>
            </div>
            
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Username or Email</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 text-sm"></i>
                        <input type="text" id="username" name="username" required 
                               class="w-full pl-10 pr-3 py-2.5 border border-slate-200 rounded-xl focus:border-slate-400 focus:ring-2 focus:ring-slate-200 transition text-sm"
                               placeholder="Enter your username or email">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 text-sm"></i>
                        <input type="password" id="password" name="password" required 
                               class="w-full pl-10 pr-3 py-2.5 border border-slate-200 rounded-xl focus:border-slate-400 focus:ring-2 focus:ring-slate-200 transition text-sm"
                               placeholder="Enter your password">
                    </div>
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white py-2.5 rounded-xl font-medium hover:bg-slate-800 transition text-sm">
                    Sign In
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-sm text-slate-600">
                    Don't have an account? 
                    <a href="/auth/signup" class="text-slate-900 font-medium hover:underline">Create account</a>
                </p>
            </div>
        </div>
    </div>
</div>


<script>
    document.getElementById('loginForm').addEventListener('submit', handleLogin);
</script>
{% endblock %}
